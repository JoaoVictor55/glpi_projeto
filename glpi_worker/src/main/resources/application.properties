spring.application.name=glpi_worker
spring.shell.script.enabled=true
spring.shell.interactive.enabled=true

spring.codec.log-request-details=true
logging.level.reactor.netty.http.client=OFF

spring.config.import=optional:file:.env[.properties]

glpi.url: http://localhost
glpi.client-id=${GLPI_CLIENT_ID}
glpi.client-secret: ${GLPI_CLIENT_SECRET}
glpi.username: ${GLPI_USERNAME}
glpi.password: ${GLPI_PASSWORD}
glpi.scope: api
glpi.api-endpoint: /api.php
